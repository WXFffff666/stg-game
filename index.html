<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>星域战机 - STG</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: #000; font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  touch-action: none; -webkit-touch-callout: none;
  -webkit-user-select: none; user-select: none;
}
#game-container {
  position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
  display: flex; align-items: center; justify-content: center;
  background: #000;
}
canvas {
  display: block; image-rendering: auto; cursor: none;
  max-width: 100vw; max-height: 100vh;
}

/* UI Overlay */
#ui-overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 10;
}
#ui-overlay > * { pointer-events: auto; }

/* HUD */
#hud {
  position: absolute; top: 10px; left: 10px; right: 10px;
  display: none; flex-direction: column; gap: 4px;
  font-size: 13px; color: #fff; text-shadow: 0 0 4px rgba(0,0,0,0.8);
}
#hud .hud-row {
  display: flex; justify-content: space-between; align-items: center;
}
#hud .hp-bar {
  width: 120px; height: 8px; background: rgba(255,255,255,0.2);
  border-radius: 4px; overflow: hidden; border: 1px solid rgba(255,255,255,0.3);
}
#hud .hp-fill {
  height: 100%; background: linear-gradient(90deg, #ff4444, #ff8844);
  transition: width 0.3s;
}
#hud .xp-bar {
  width: 120px; height: 4px; background: rgba(255,255,255,0.15);
  border-radius: 2px; overflow: hidden;
}
#hud .xp-fill {
  height: 100%; background: linear-gradient(90deg, #4488ff, #44ddff);
  transition: width 0.3s;
}
#hud .combo-text {
  position: absolute; top: 50px; left: 50%; transform: translateX(-50%);
  font-size: 18px; font-weight: bold; color: #ffdd00;
  text-shadow: 0 0 10px rgba(255,221,0,0.8);
  opacity: 0; transition: opacity 0.3s;
}
#hud .combo-text.active { opacity: 1; }

/* Menu Screens */
.menu-screen {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: rgba(5,5,30,0.92); color: #fff;
  z-index: 20;
}
.menu-screen h1 {
  font-size: 36px; font-weight: bold; margin-bottom: 8px;
  background: linear-gradient(180deg, #ffdd00, #ff8800);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: none;
}
.menu-screen .subtitle {
  font-size: 14px; color: #8888cc; margin-bottom: 40px; letter-spacing: 4px;
}
.menu-btn {
  width: 220px; padding: 14px 0; margin: 6px 0;
  border: 2px solid rgba(255,255,255,0.3); border-radius: 8px;
  background: rgba(255,255,255,0.08); color: #fff;
  font-size: 16px; cursor: pointer; text-align: center;
  transition: all 0.2s; letter-spacing: 2px;
}
.menu-btn:hover, .menu-btn:active {
  background: rgba(255,221,0,0.15); border-color: #ffdd00;
  transform: scale(1.03);
}
.menu-btn.highlight {
  border-color: #ffdd00; background: rgba(255,221,0,0.1);
}

/* Character Select */
#char-select {
  display: none; flex-wrap: wrap; gap: 10px; justify-content: center;
  max-width: 440px; padding: 20px;
}
.char-card {
  width: 120px; padding: 10px; border: 2px solid rgba(255,255,255,0.2);
  border-radius: 10px; background: rgba(255,255,255,0.05);
  cursor: pointer; text-align: center; transition: all 0.2s;
}
.char-card:hover, .char-card:active {
  border-color: #ffdd00; background: rgba(255,221,0,0.1); transform: scale(1.05);
}
.char-card .icon { font-size: 28px; margin-bottom: 4px; }
.char-card .name { font-size: 12px; font-weight: bold; }
.char-card .desc { font-size: 10px; color: #aaa; margin-top: 2px; }

/* Level Up Overlay */
#level-up {
  display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.8); z-index: 30;
  flex-direction: column; align-items: center; justify-content: center;
}
#level-up h2 {
  font-size: 28px; color: #ffdd00; margin-bottom: 20px;
  text-shadow: 0 0 20px rgba(255,221,0,0.5);
}
#level-up .skill-choices {
  display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
  max-width: 440px;
}
.skill-card {
  width: 130px; padding: 14px 10px; border: 2px solid rgba(255,255,255,0.3);
  border-radius: 10px; background: rgba(20,20,50,0.9);
  cursor: pointer; text-align: center; transition: all 0.2s;
}
.skill-card:hover, .skill-card:active {
  border-color: #ffdd00; transform: scale(1.05);
}
.skill-card .skill-name { font-size: 13px; font-weight: bold; color: #fff; margin-bottom: 4px; }
.skill-card .skill-desc { font-size: 10px; color: #ccc; }
.skill-card .skill-rarity { font-size: 10px; margin-top: 4px; }
.rarity-common .skill-rarity { color: #aaaaaa; }
.rarity-uncommon .skill-rarity { color: #44dd44; }
.rarity-rare .skill-rarity { color: #4488ff; }
.rarity-epic .skill-rarity { color: #aa44ff; }
.rarity-legendary .skill-rarity { color: #ffaa00; }
.rarity-common { border-color: rgba(170,170,170,0.5); }
.rarity-uncommon { border-color: rgba(68,221,68,0.5); }
.rarity-rare { border-color: rgba(68,136,255,0.5); }
.rarity-epic { border-color: rgba(170,68,255,0.5); }
.rarity-legendary { border-color: rgba(255,170,0,0.5); }
/* Weapon cards: distinct styling with bullet color accent */
.weapon-card {
  background: rgba(20,30,60,0.95);
  box-shadow: inset 0 0 15px rgba(100,150,255,0.1);
}
.weapon-card:hover, .weapon-card:active {
  transform: scale(1.08);
  box-shadow: inset 0 0 20px rgba(100,150,255,0.2), 0 0 12px rgba(255,255,255,0.15);
}
.weapon-card .skill-icon { filter: drop-shadow(0 0 4px currentColor); }

/* Fusion Card */
.fusion-card {
  background: linear-gradient(135deg, rgba(100,50,150,0.9), rgba(50,100,150,0.9)) !important;
  border: 2px solid #ff44ff !important;
  box-shadow: 0 0 20px rgba(255,68,255,0.3), inset 0 0 15px rgba(255,68,255,0.1);
  animation: fusionPulse 1.5s ease-in-out infinite;
}
.fusion-card:hover, .fusion-card:active {
  border-color: #ff88ff !important;
  box-shadow: 0 0 30px rgba(255,68,255,0.5), inset 0 0 20px rgba(255,68,255,0.2);
}
@keyframes fusionPulse {
  0%, 100% { box-shadow: 0 0 20px rgba(255,68,255,0.3), inset 0 0 15px rgba(255,68,255,0.1); }
  50% { box-shadow: 0 0 30px rgba(255,68,255,0.5), inset 0 0 20px rgba(255,68,255,0.2); }
}
.fusion-card .fusion-ingredients {
  font-size: 9px; color: #dd88ff; margin-top: 4px;
}
.fusion-card .skill-type {
  color: #ff88ff !important;
}

/* Fusion Notification Banner */
#fusion-notification {
  display: none; position: absolute; top: 60px; left: 50%; transform: translateX(-50%);
  background: linear-gradient(135deg, rgba(100,50,150,0.95), rgba(50,100,150,0.95));
  border: 2px solid #ff44ff; border-radius: 12px;
  padding: 12px 20px; z-index: 25; text-align: center;
  box-shadow: 0 0 30px rgba(255,68,255,0.4);
  animation: fusionSlideIn 0.5s ease-out;
  cursor: pointer; pointer-events: auto;
}
#fusion-notification .fusion-title {
  font-size: 16px; font-weight: bold; color: #ff88ff;
  text-shadow: 0 0 10px rgba(255,136,255,0.6);
}
#fusion-notification .fusion-desc {
  font-size: 11px; color: #ccaaff; margin-top: 4px;
}
@keyframes fusionSlideIn {
  from { transform: translateX(-50%) translateY(-20px); opacity: 0; }
  to { transform: translateX(-50%) translateY(0); opacity: 1; }
}

/* Game Over */
#game-over {
  display: none;
}
#game-over .final-score {
  font-size: 48px; font-weight: bold; color: #ffdd00;
  text-shadow: 0 0 30px rgba(255,221,0,0.6);
  margin-bottom: 10px;
}
#game-over .stats {
  font-size: 14px; color: #aaa; margin-bottom: 30px; text-align: center; line-height: 1.8;
}

/* Leaderboard */
#leaderboard {
  display: none;
}
#leaderboard .lb-list {
  width: 280px; max-height: 300px; overflow-y: auto;
  margin: 20px 0;
}
.lb-entry {
  display: flex; justify-content: space-between; padding: 8px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 14px;
}
.lb-entry .rank { color: #ffdd00; width: 30px; }
.lb-entry .score { color: #44ddff; }

/* Pause overlay */
#pause-overlay {
  display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.6); z-index: 25;
  align-items: center; justify-content: center;
  font-size: 36px; color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.5);
}

/* Toast messages */
.toast {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  font-size: 20px; font-weight: bold; color: #ffdd00;
  text-shadow: 0 0 10px rgba(255,221,0,0.8);
  pointer-events: none; opacity: 0; transition: opacity 0.3s;
  z-index: 35;
}
.toast.show { opacity: 1; }

/* Responsive */
@media (max-width: 480px) {
  .menu-screen h1 { font-size: 28px; }
  .menu-btn { width: 180px; padding: 12px 0; font-size: 14px; }
  .char-card { width: 100px; padding: 8px; }
  .skill-card { width: 110px; padding: 10px 8px; }
  #hud { font-size: 11px; }
}

/* Upgrade Shop */
#upgrade-shop {
  display: none;
}
#upgrade-shop .shop-header {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; max-width: 400px; margin-bottom: 16px;
}
#upgrade-shop .star-coins-display {
  font-size: 18px; color: #ffdd00;
  text-shadow: 0 0 10px rgba(255,221,0,0.5);
}
#upgrade-shop .upgrade-list {
  display: flex; flex-direction: column; gap: 10px;
  width: 100%; max-width: 400px; max-height: 60vh; overflow-y: auto;
  padding: 0 10px;
}
.upgrade-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; border: 2px solid rgba(255,255,255,0.15);
  border-radius: 10px; background: rgba(255,255,255,0.05);
  transition: all 0.2s;
}
.upgrade-item:hover {
  border-color: rgba(255,221,0,0.3); background: rgba(255,255,255,0.08);
}
.upgrade-icon {
  font-size: 28px; flex-shrink: 0;
}
.upgrade-info {
  flex: 1; text-align: left;
}
.upgrade-name {
  font-size: 14px; font-weight: bold; color: #fff;
}
.upgrade-level {
  font-size: 11px; color: #888; margin-top: 2px;
}
.upgrade-effect {
  font-size: 11px; color: #44ddff; margin-top: 2px;
}
.upgrade-btn {
  padding: 8px 16px; border: 2px solid #ffdd00; border-radius: 6px;
  background: rgba(255,221,0,0.15); color: #ffdd00;
  font-size: 13px; cursor: pointer; transition: all 0.2s;
  flex-shrink: 0; min-width: 90px; text-align: center;
}
.upgrade-btn:hover:not(:disabled) {
  background: rgba(255,221,0,0.3); transform: scale(1.05);
}
.upgrade-btn:disabled {
  border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.3);
  background: rgba(255,255,255,0.05); cursor: not-allowed;
}
.upgrade-btn.max-level {
  border-color: #44dd44; color: #44dd44; background: rgba(68,221,68,0.1);
  cursor: default;
}
.star-coin-earned {
  font-size: 20px; color: #ffdd00; margin-top: 8px;
  text-shadow: 0 0 15px rgba(255,221,0,0.6);
}

/* Pause Overlay */
#pause-overlay {
  display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.85); z-index: 50;
  flex-direction: column; align-items: center; justify-content: center; gap: 16px;
}
.pause-title {
  font-size: 36px; color: #ffdd00; font-weight: bold;
  text-shadow: 0 0 20px rgba(255,221,0,0.5);
}
.pause-buttons {
  display: flex; flex-direction: column; gap: 12px; margin-top: 20px;
}
.pause-btn {
  padding: 14px 40px; border: 2px solid rgba(255,255,255,0.3); border-radius: 8px;
  background: rgba(255,255,255,0.08); color: #fff; font-size: 16px;
  cursor: pointer; transition: all 0.2s; min-width: 200px; text-align: center;
}
.pause-btn:hover {
  border-color: #ffdd00; background: rgba(255,221,0,0.15); color: #ffdd00;
  transform: scale(1.05);
}

/* In-Run Shop */
#in-run-shop {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(5,5,30,0.95); z-index: 60;
  flex-direction: column; align-items: center; padding: 20px; overflow-y: auto;
}
.shop-header {
  text-align: center; margin-bottom: 20px;
}
.shop-title {
  font-size: 28px; color: #ffdd00; font-weight: bold;
  text-shadow: 0 0 15px rgba(255,221,0,0.5);
}
.shop-gold {
  font-size: 20px; color: #ffdd00; margin-top: 8px;
}
.shop-items {
  display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 400px;
  margin-bottom: 20px;
}
.shop-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; border: 2px solid rgba(255,255,255,0.15);
  border-radius: 10px; background: rgba(255,255,255,0.05);
  transition: all 0.2s;
}
.shop-item:hover {
  border-color: rgba(255,221,0,0.3); background: rgba(255,255,255,0.08);
}
.shop-item-icon {
  font-size: 28px; flex-shrink: 0;
}
.shop-item-info {
  flex: 1; text-align: left;
}
.shop-item-name {
  font-size: 14px; font-weight: bold; color: #fff;
}
.shop-item-level {
  font-size: 11px; color: #888; margin-top: 2px;
}
.shop-item-desc {
  font-size: 11px; color: #44ddff; margin-top: 2px;
}
.shop-item-btn {
  padding: 8px 16px; border: 2px solid #ffdd00; border-radius: 6px;
  background: rgba(255,221,0,0.15); color: #ffdd00;
  font-size: 13px; cursor: pointer; transition: all 0.2s;
  flex-shrink: 0; min-width: 90px; text-align: center;
}
.shop-item-btn:hover:not(:disabled) {
  background: rgba(255,221,0,0.3); transform: scale(1.05);
}
.shop-item-btn:disabled {
  border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.3);
  background: rgba(255,255,255,0.05); cursor: not-allowed;
}
.shop-item-btn.max-level {
  border-color: #44dd44; color: #44dd44; background: rgba(68,221,68,0.1);
  cursor: default;
}

/* Codex (图鉴) Styles */
.codex-tabs {
  display: flex; gap: 10px; margin: 15px 0;
}
.codex-tab {
  padding: 8px 20px; border: 2px solid rgba(255,255,255,0.3); border-radius: 6px;
  background: rgba(255,255,255,0.05); color: #fff; cursor: pointer; transition: all 0.2s;
}
.codex-tab:hover { border-color: #ffdd00; }
.codex-tab.active { border-color: #ffdd00; background: rgba(255,221,0,0.2); color: #ffdd00; }
.codex-content {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px; max-width: 500px; max-height: 400px; overflow-y: auto; padding: 10px;
}
.codex-card {
  padding: 10px; border: 2px solid rgba(255,255,255,0.2); border-radius: 8px;
  background: rgba(255,255,255,0.05); text-align: center; transition: all 0.2s;
}
.codex-card:hover { border-color: #ffdd00; transform: scale(1.05); }
.codex-card-icon { font-size: 24px; margin-bottom: 5px; }
.codex-card-name { font-size: 12px; font-weight: bold; color: #fff; }
.codex-card-desc { font-size: 10px; color: #aaa; margin-top: 4px; }
.codex-card-fusion { font-size: 9px; color: #ffdd00; margin-top: 3px; }

/* Settings Styles */
.settings-content {
  max-width: 300px; width: 100%;
}
.setting-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.1);
}
.setting-item label { font-size: 14px; color: #fff; }
.setting-item input[type="range"] {
  width: 120px; accent-color: #ffdd00;
}
.toggle {
  position: relative; display: inline-block; width: 50px; height: 24px;
}
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
  position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
  background-color: rgba(255,255,255,0.2); transition: 0.3s; border-radius: 24px;
}
.toggle-slider:before {
  position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px;
  background-color: white; transition: 0.3s; border-radius: 50%;
}
.toggle input:checked + .toggle-slider { background-color: #44dd44; }
.toggle input:checked + .toggle-slider:before { transform: translateX(26px); }
</style>
</head>
<body>
<div id="game-container">
  <canvas id="game-canvas"></canvas>

  <!-- HUD (hidden by default) -->
  <div id="hud">
    <div class="hud-row">
      <span>❤️ <span id="hp-text">100/100</span></span>
      <div class="hp-bar"><div class="hp-fill" id="hp-fill" style="width:100%"></div></div>
    </div>
    <div class="hud-row">
      <span>⭐ <span id="score-text">0</span></span>
      <span>Lv.<span id="level-text">1</span></span>
    </div>
    <div class="hud-row">
      <span></span>
      <div class="xp-bar"><div class="xp-fill" id="xp-fill" style="width:0%"></div></div>
    </div>
    <div class="hud-row">
      <span>💀 <span id="kills-text">0</span></span>
      <span>⏱️ <span id="time-text">00:00</span></span>
    </div>
    <div class="hud-row">
      <span>💰 <span id="gold-text">0</span></span>
      <span></span>
    </div>
    <div class="combo-text" id="combo-text"></div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Pause Overlay -->
  <div id="pause-overlay">
    <div class="pause-title">⏸️ 已暂停</div>
    <div class="pause-buttons">
      <button class="pause-btn" id="btn-resume">继续游戏</button>
      <button class="pause-btn" id="btn-pause-shop">💰 商店</button>
      <button class="pause-btn" id="btn-pause-restart">重新开始</button>
      <button class="pause-btn" id="btn-pause-menu">返回主菜单</button>
    </div>
  </div>

  <!-- In-Run Shop -->
  <div id="in-run-shop" style="display:none">
    <div class="shop-header">
      <div class="shop-title">💰 局内商店</div>
      <div class="shop-gold">金币: <span id="shop-gold-display">0</span></div>
    </div>
    <div class="shop-items" id="shop-items"></div>
    <button class="menu-btn" id="btn-close-shop">关闭商店</button>
  </div>

  <!-- Main Menu -->
  <div class="menu-screen" id="menu-screen">
    <h1>星域战机</h1>
    <div class="subtitle">STAR DOMAIN STG</div>
    <button class="menu-btn highlight" id="btn-start">开始游戏</button>
    <button class="menu-btn" id="btn-codex">📖 图鉴</button>
    <button class="menu-btn" id="btn-settings">⚙️ 设置</button>
    <button class="menu-btn" id="btn-leaderboard">排行榜</button>
    <button class="menu-btn" id="btn-howto">操作说明</button>
  </div>

  <!-- Character Select -->
  <div class="menu-screen" id="char-select-screen" style="display:none">
    <h1 style="font-size:28px">选择流派</h1>
    <div class="subtitle">SELECT FACTION</div>
    <div id="char-select"></div>
    <button class="menu-btn" id="btn-back-menu" style="margin-top:16px">返回</button>
  </div>

  <!-- Level Up -->
  <div id="level-up">
    <h2>⬆️ 升级！选择技能</h2>
    <div class="skill-choices" id="skill-choices"></div>
  </div>

  <!-- Fusion Notification -->
  <div id="fusion-notification">
    <div class="fusion-title">🔮 融合可用！</div>
    <div class="fusion-desc" id="fusion-notification-desc"></div>
  </div>

  <!-- Game Over -->
  <div class="menu-screen" id="game-over">
    <h1>游戏结束</h1>
    <div class="final-score" id="final-score">0</div>
    <div class="star-coin-earned" id="star-coin-earned"></div>
    <div class="stats" id="game-stats"></div>
    <button class="menu-btn" id="btn-restart">再来一局</button>
    <button class="menu-btn" id="btn-menu">返回主菜单</button>
  </div>

  <!-- Leaderboard -->
  <div class="menu-screen" id="leaderboard">
    <h1 style="font-size:28px">排行榜</h1>
    <div class="subtitle">LEADERBOARD</div>
    <div class="lb-list" id="lb-list"></div>
    <button class="menu-btn" id="btn-back-from-lb">返回</button>
  </div>

  <!-- How to Play -->
  <div class="menu-screen" id="howto-screen" style="display:none">
    <h1 style="font-size:24px">操作说明</h1>
    <div style="max-width:300px;text-align:left;line-height:2;font-size:14px;margin:20px">
      🖱️ <b>鼠标/触摸</b>：移动战机<br>
      🔫 自动射击（始终开启）<br>
      ⬆️ 击杀敌人获得经验升级<br>
      🎯 升级时从3个技能中选1个<br>
      💎 拾取道具获得增益<br>
      ☠️ 避开红色减益道具<br>
      ⌨️ <b>P/ESC</b>：暂停游戏<br>
      👑 BOSS每20000分出现
    </div>
    <button class="menu-btn" id="btn-back-from-howto">返回</button>
  </div>

  <!-- Codex (图鉴) -->
  <div class="menu-screen" id="codex-screen" style="display:none">
    <h1 style="font-size:28px">📖 图鉴</h1>
    <div class="codex-tabs">
      <button class="codex-tab active" data-tab="weapons">武器</button>
      <button class="codex-tab" data-tab="skills">技能</button>
      <button class="codex-tab" data-tab="factions">流派</button>
    </div>
    <div class="codex-content" id="codex-content"></div>
    <button class="menu-btn" id="btn-back-from-codex">返回</button>
  </div>

  <!-- Settings (设置) -->
  <div class="menu-screen" id="settings-screen" style="display:none">
    <h1 style="font-size:28px">⚙️ 设置</h1>
    <div class="settings-content">
      <div class="setting-item">
        <label>🔊 总音量</label>
        <input type="range" id="master-volume" min="0" max="100" value="50">
      </div>
      <div class="setting-item">
        <label>🔫 音效音量</label>
        <input type="range" id="sfx-volume" min="0" max="100" value="70">
      </div>
      <div class="setting-item">
        <label>🎵 音乐音量</label>
        <input type="range" id="music-volume" min="0" max="100" value="30">
      </div>
      <div class="setting-item">
        <label>📳 屏幕震动</label>
        <label class="toggle">
          <input type="checkbox" id="screen-shake" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>
    <button class="menu-btn" id="btn-back-from-settings">返回</button>
  </div>

</div>
